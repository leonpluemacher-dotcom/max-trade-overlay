<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trade Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000000;font-family:'Inter',sans-serif;color:#e0e0e0;overflow:hidden}

  .box{
    background:rgba(18,18,24,0.9);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:10px;padding:12px 16px;
    width:280px;backdrop-filter:blur(8px);
  }
  .hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#777;font-weight:600}
  .dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:p 2s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

  .today{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05)}
  .profit{font-size:26px;font-weight:700;letter-spacing:-.5px}
  .meta{text-align:right;font-size:10px;color:#777;line-height:1.6}
  .meta b{color:#ccc;font-weight:600}

  .wl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:#555;margin-bottom:5px;font-weight:600}
  .wr{display:flex;gap:3px}
  .dc{flex:1;text-align:center}
  .dl{font-size:8px;color:#444;margin-bottom:2px;font-weight:600}
  .db{height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;background:rgba(255,255,255,.03);color:#444}
  .db.pos{background:rgba(74,222,128,.13);color:#4ade80}
  .db.neg{background:rgba(248,113,113,.13);color:#f87171}
  .db.tm{border:1px solid rgba(255,255,255,.12)}

  .wt{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05);font-size:10px;color:#777}
  .wv{font-weight:700;font-size:12px}

  .pos{color:#4ade80}.neg{color:#f87171}.zero{color:#666}
</style>
</head>
<body>
<div class="box">
  <div class="hdr"><div class="dot"></div>Live Trading</div>
  <div class="today">
    <div class="profit zero" id="tp">0.00%</div>
    <div class="meta"><div><b id="tc">0</b> Trades</div><div>Heute</div></div>
  </div>
  <div class="wl">Diese Woche</div>
  <div class="wr" id="wr"></div>
  <div class="wt">
    <span>Gesamt: <b id="wc">0</b> Trades</span>
    <span class="wv zero" id="wp">0.00%</span>
  </div>
</div>
<script>
const today=new Date().toISOString().slice(0,10);
const fmt=v=>(v>0?'+':'')+v.toFixed(2)+'%';
const c=v=>v>0?'pos':v<0?'neg':'zero';

function render(s){
  const tp=document.getElementById('tp');
  tp.textContent=fmt(s.today.profit);
  tp.className='profit '+c(s.today.profit);
  document.getElementById('tc').textContent=s.today.count;

  const wr=document.getElementById('wr');
  wr.innerHTML='';
  s.week.days.forEach(d=>{
    const col=document.createElement('div');col.className='dc';
    const lb=document.createElement('div');lb.className='dl';lb.textContent=d.label;
    const bar=document.createElement('div');bar.className='db';
    if(d.count>0){bar.classList.add(c(d.profit));bar.textContent=(d.profit>0?'+':'')+d.profit.toFixed(1)}
    else bar.textContent='--';
    if(d.date===today)bar.classList.add('tm');
    col.appendChild(lb);col.appendChild(bar);wr.appendChild(col);
  });

  document.getElementById('wc').textContent=s.week.count;
  const wp=document.getElementById('wp');
  wp.textContent=fmt(s.week.profit);
  wp.className='wv '+c(s.week.profit);
}

async function poll(){
  try{const r=await fetch('/api/stats');render(await r.json())}catch(e){}
}
poll();
setInterval(poll,2000);
</script>
</body>
</html>
